name: Swarm CI

on:
  push:
    branches: [ master, main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
        pip install pip-audit  # Required for security scan

    - name: Run Tests
      run: |
        pytest tests/ -v


    - name: Import healer coverage gate
      run: |
        python tools/swarm/tests/check_import_healer_coverage.py

    - name: Swarm Security Scan
      run: |
        python tools/cli.py --security-scan

    - name: Swarm Import Audit
      run: |
        python tools/cli.py --audit-imports


  publish-pypi:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Build distribution
      run: |
        python -m pip install --upgrade pip
        pip install 'build>=1.0' 'twine>=6.0' hatchling
        python -m build
        python -m twine check dist/*

    - name: Publish to PyPI
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
      run: python -m twine upload dist/*
