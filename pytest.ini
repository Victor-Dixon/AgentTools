[pytest]
testpaths =
    tests
    tools/consolidation/tests
    tools/swarm/tests
    tools_v2/tests

python_files = test_*.py *_test.py

norecursedirs =
    .git
    node_modules
    docs/quarantine
    tools/deprecated
    __pycache__
    .pytest_cache

markers =
    qt: tests requiring a Qt binding
